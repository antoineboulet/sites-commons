website:
  title: "Antoine Boulet"
  search: 
    location: navbar
  open-graph: true
  navbar: 
    background: light
    title: "Antoine Boulet"
  favicon: system/favicon.svg

book: 
  search: 
    location: navbar
  open-graph: true
  navbar: 
    background: light
    title: "Antoine Boulet"
  favicon: system/favicon.svg
  author: "Antoine Boulet"
  date: today
  downloads: [pdf]

format:
  html:
    link-external-newwindow: true
    link-external-icon: true
    theme:
      light: 
        - flatly
        - brand
      dark: 
        - darkly
        - brand
    toc: true
    css: 
      - system/styles/common-custom-theme.css
    html-math-method:
      method: mathjax
      url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
    
filters:
  - system/filters/margin-html-figure.lua
  - system/filters/hint.lua